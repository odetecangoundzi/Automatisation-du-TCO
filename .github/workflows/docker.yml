name: Docker Build

on:
  push:
    branches: [main]
    paths:
      - "Dockerfile"
      - "requirements.txt"
      - "app.py"
      - "core/**"
      - ".github/workflows/docker.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Permissions minimales requises par le cache GHA et le checkout
permissions:
  contents: read
  actions: write

jobs:
  # ─────────────────────────────────────────────────────────────
  # JOB — Build de l'image Docker (validation sans push)
  # ─────────────────────────────────────────────────────────────
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (validation uniquement, sans push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: tco-automator:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
